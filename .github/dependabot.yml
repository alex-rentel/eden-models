version: 2

updates:
  # Top-level requirements.txt — what the README's install command pulls in.
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Detroit
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - python

  # benchmarks/ has its own requirements.txt for matplotlib + plotting deps.
  - package-ecosystem: pip
    directory: /benchmarks
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - python
      - benchmarks
