# Eden v1: Qwen3-1.7B LoRA tool-calling fine-tune
# Target: M1 Max 64GB, overnight run

model: mlx-community/Qwen3-1.7B-4bit
train: true
data: data/
num_layers: 16
batch_size: 4
iters: 1000
learning_rate: 1e-5
steps_per_report: 10
steps_per_eval: 200
save_every: 200
max_seq_length: 2048
mask_prompt: true
adapter_path: adapters/qwen3-1.7b-tools-v1
seed: 42

lora_parameters:
  rank: 16
  scale: 20.0
  dropout: 0.0
